# Dashcam GPS Overlay - EXAMPLE config
# Copy this file to config.ini and edit config.ini instead - config.ini is
# gitignored, so your personal paths/settings never get committed. You
# should never need to touch the .py scripts.

[paths]
# Folder containing the original dashcam .MP4 segments
clip_folder = real_cam
# Intermediate files (track/labels/map frames) go here
work_folder = work
# Final rendered video
output_file = trip_overlay.mp4

[diagnostics]
# extract_gps.py warns (doesn't stop) when consecutive GPS points are more
# than this many real-world minutes apart (camera power loss/malfunction,
# not just normal clip segmentation). The warning includes a straight-line
# distance estimate - actual mileage for that stretch is undercounted if
# the road wasn't straight during the gap.
gap_warning_minutes = 10

[video]
# x264 quality (lower = better/larger). 18-23 is sensible.
crf = 20
preset = medium
# optional WIDTHxHEIGHT (e.g. 960x540) to downscale the final output for
# faster preview/test renders. Leave blank for full-resolution output.
preview_scale =

[labels]
enabled = true
# {name} = town, {state} = 2-letter state abbreviation
format = {name}, {state}
font = Arial
font_size = 48
# one of: bottom_center, bottom_left, bottom_right, top_center, top_left, top_right
position = bottom_center
# vertical margin from edge, px
margin_v = 60
# fade in/out duration, ms
fade_ms = 500
outline = 2

[info]
# second line under the town name: speed / distance / local time
enabled = true
font_size = 26
# vertical margin from bottom edge, px (sits below the town label)
margin_v = 8
# placeholders: {speed} mph (zero-padded to 3 digits), {dist}/{remain} mi
# (zero-padded to 4 digits - this is a ~2000mi trip), {time} local (24h,
# zero-padded), {date} local (YYYY-MM-DD). Rendered in a monospace font
# (Consolas/DejaVu Sans Mono/Liberation Mono) with leading zeros dimmed and
# significant digits full brightness - classic digital-odometer look.
format = {speed:03.0f} mph · {dist:04.0f} mi traveled · {remain:04.0f} mi to go · {time} · {date}
# {speed} source: "average" (default) computes speed from actual GPS
# position change between consecutive fixes divided by real elapsed
# time, instead of trusting the camera's raw instantaneous speed field.
# This matters a lot on timelapse-capture footage (confirmed on a real
# trip: one GPS fix per real minute, so a single glitched raw reading -
# e.g. GPS noise right at a stop - gets shown as fact for a whole
# displayed second). Set to "raw" to use the camera's own reported
# speed field instead (slight understatement of speed possible on tight
# curves with "average", since it uses straight-line distance between
# fixes - usually a smaller error than a raw-field glitch, but not
# perfect either way).
speed_source = average
# hours to add if the camera clock turns out not to be true UTC
utc_offset_adjust = 0
# Round 4: shown in place of the whole info line (and the town label just
# goes blank) during any clip with zero GPS chunks - see work/gaps.csv.
# Footage from these clips is kept; there's just nothing honest to display
# for speed/position/town during them.
no_gps_text = NO GPS LOCK

[map_trip]
# Full extracted route, fixed bbox for the whole render. Top-left.
enabled = true
# inset width in px
# 480 recommended for wide east-west routes (e.g. VA -> AZ)
width = 480
# inset height in px - optional. Leave unset (or 0) and height auto-fits
# to this render's own route shape - the default, and probably what most
# users want. Set explicitly to lock the panel to one consistent size
# across every render regardless of route shape (letterboxed inside that
# box, not stretched - see _letterbox_pad() in render_overlay.py). This
# is a personal preference, not a "correct" value - pick whatever suits
# your own footage if you use it at all.
# height = 200
# one of: top_right, top_left, bottom_right, bottom_left
corner = top_left
# margin from video edges, px
margin = 20
# small bottom-left label so it's clear at a glance which inset is which -
# blank to draw no caption at all
caption = TRIP MAP
caption_font_size = 10
caption_color = #ffffff
route_color = #9e9e9e
progress_color = #ff3b30
dot_color = #ffffff
panel_color = #000000
panel_alpha = 0.40
line_width = 2.0

# State/coast borders drawn under the route (map_data/us_borders.geojson)
show_borders = true
borders_file = map_data/us_borders.geojson
border_color = #8a8a8a
border_width = 0.7

# Major-city dots near the route (map_data/us_cities.csv)
show_cities = true
cities_file = map_data/us_cities.csv
# include cities within this many miles of the route
city_radius_mi = 40
# minimum spacing between shown cities (higher-ranked city wins)
city_min_gap_mi = 150
city_font_size = 9
city_dot_size = 3.5
city_color = #ffd35c

[map_day]
# Re-frames its bbox at each local-midnight boundary. Top-right. Same keys
# as [map_trip], independently enable-able and tunable.
enabled = true
width = 480
# See [map_trip] height comment above - optional, locks the panel to one
# size shared across every local-day segment in this render.
# height = 200
corner = top_right
margin = 20
# Instead of hard-cutting straight to the next day's bbox, the panel fades
# to fully transparent right at the boundary and back in over this many
# video-seconds on each side (0 disables fading - the original hard cut).
fade_secs = 2
caption = SEGMENT MAP
caption_font_size = 10
caption_color = #ffffff
route_color = #9e9e9e
progress_color = #ff3b30
dot_color = #ffffff
panel_color = #000000
panel_alpha = 0.40
line_width = 2.0

show_borders = true
borders_file = map_data/us_borders.geojson
border_color = #8a8a8a
border_width = 0.7

show_cities = true
cities_file = map_data/us_cities.csv
# tighter than map_trip: a single day's driving covers much less ground
city_radius_mi = 30
city_min_gap_mi = 50
city_font_size = 9
city_dot_size = 3.5
city_color = #ffd35c

[roads]
# Round 2: highway shields in the info line. Disabled by default - needs a
# real roads_file (Census TIGER Primary Roads, RTTYP I + U) downloaded on
# this Windows box; the sandbox test fixture
# (map_data/synthetic_roads_test.geojson, hand-simplified I-30 only) is
# NOT suitable for a real trip render.
# When enabled, this REPLACES the ASS "Info" style above with a PNG-strip
# overlay (shield + text); [info] format/font_size/margin_v still apply.
enabled = false
roads_file = map_data/roads.geojson
tolerance_mi = 0.031
grace_secs = 3
# Below this speed (mph), freeze the displayed road match AND the NB/EB/
# SB/WB direction suffix at their last known-good values instead of
# re-evaluating every second - a stopped vehicle's GPS heading is pure
# noise, and sitting still near a real road junction can drift out of
# tolerance of the "correct" road just from being parked. Shared with
# [local_roads], which has no separate key of its own - same vehicle,
# same speed either way.
freeze_below_mph = 3.0
shield_height_px = 52
shield_fade_secs = 1
# 938px measured for the [info] format string above (incl. {date}) at
# font_size=26 in the monospace info font; 1020 leaves margin. Re-measure
# if the format string, font_size, or font changes - a too-narrow value
# here causes the center text to visibly overlap the shield/route-label
# on the left and the compass on the right (confirmed the hard way).
# Note: monospace space characters are much wider than a proportional
# font's - keep separators tight (1 space, not more) or this balloons.
text_zone_width_px = 1020
shield_gap_px = 12
# "I-30 WB" style route+direction label, right-aligned, immediately left
# of the shield. 220px (was 140) - re-measured 2026-07-13 with PIL for the
# concurrent-designation format below ("I-10 / US 70 WB" measures ~147px,
# "I-40 / I-25 / US 66 SB" ~194px at this font_size); a single-designation
# label just gets extra blank space to its left, harmless since it's
# right-aligned. Re-measure again if route_label_font_size changes.
route_label_width_px = 220
route_label_gap_px = 6
route_label_font_size = 20
margin_v = 8
# Show physically-concurrent highway designations in the route label
# instead of picking one winner, e.g. "I-10 / US 70 WB" where I-10 and
# US-70 run the same pavement near Deming, NM (previously only I-10 would
# show, per _ROUTE_TYPE_PRIORITY - now both do). Still only ONE shield
# graphic (the tier-priority winner, unchanged) - just the text widens.
# Off by default; only ever evaluated against [roads] (highway) matches,
# never [local_roads].
show_concurrent_designations = false
# how many EXTRA designations to show beyond the primary one (1 -> "I-10 /
# US 70 WB", 2 total shown)
max_concurrent_designations = 1
# Optional soft blurred halo behind each shield, for extra contrast against
# bright backgrounds (sky, sun glare, light pavement) - a real comparison
# against dashcam footage found a dark halo works better than a white rim
# glow (barely visible on dark asphalt, but keeps the white shield border
# from blending into bright scenery). Purely a look preference - off by
# default. Vertically clipped to the info strip's existing top/bottom
# margin rather than growing it (see render_info_frames() /
# shield_glow_cache_for()), so a large radius may look slightly cut off
# top/bottom at typical shield_height_px values.
shield_glow_enabled = false
shield_glow_radius_px = 10
shield_glow_alpha = 170
shield_glow_color = #000000

[local_roads]
# Round 3: local (non-highway) street names, e.g. "Maple Street WB" - shown
# text-only (no shield graphic, real street signs don't have one) in the
# same label zone as the [roads] route label, and ONLY when the vehicle
# isn't currently matched to a highway from [roads]. Fades using the same
# [roads] shield_fade_secs curve (one merged match stream, one fade timer -
# not a separate control here).
# Needs a real roads_file (TIGER All Roads, MTFCC-filtered, Windows-box-only
# download) for a full-trip render; the sandbox test fixture
# (map_data/synthetic_local_roads_test.geojson) is synthetic, same caveat
# as [roads]'s synthetic_roads_test.geojson.
enabled = false
roads_file = map_data/local_roads.geojson
# Tighter than [roads] tolerance_mi (0.031) - local street grids are dense,
# a loose tolerance risks snapping to the wrong parallel street.
tolerance_mi = 0.02
grace_secs = 2

[compass]
# Direction-of-travel indicator: mirrors the [roads] shield/label pair,
# but on the RIGHT of the info-line text zone - a small rotating needle-
# in-circle plus e.g. "SW 225". Uses the same real device-reported GPS
# heading as the [roads]/[local_roads] direction suffix (see
# extract_gps.py - it's the camera's own GPS course, not a derived
# point-to-point bearing), smoothed and frozen-while-stopped so it
# doesn't jump around at red lights or in parking lots. Only takes
# effect when [info] is rendering via the PNG strip (i.e. [roads] or
# [local_roads] is also enabled).
enabled = false
size_px = 44
gap_px = 12
label_gap_px = 6
label_width_px = 100
font_size = 20
# seconds of circular moving average applied to the raw per-second
# heading before display
smoothing_window_secs = 5
# below this speed, the compass holds its last smoothed heading instead
# of updating - device heading is frequently noise while stopped
freeze_below_mph = 3.0
# the displayed 8-point label (N/NE/E/SE/S/SW/W/NW) only changes once the
# nearest octant has differed from the current label for more than this
# many consecutive seconds - avoids flicker right at an octant boundary
hysteresis_hold_secs = 2
# Traditional two-tone compass-needle diamond: red half toward the
# heading, gray tail half opposite. Rose is anti-aliased the same way as
# the highway shields (internal supersample + LANCZOS downscale).
needle_color = #d32121
tail_color = #e0e0e0
# Optional dark halo behind the rose, same idea as [roads] shield_glow_* -
# off by default, like the shield glow, since it's a look preference.
glow_enabled = false
glow_radius_px = 6
glow_alpha = 170
glow_color = #000000

[day_title]
# Optional brief title card at the start of each local-day segment (reuses
# the same day_segments() midnight-cut logic as [map_day]): "Day 2 -
# Bristol, VA to Texarkana, TX". Town/state text is auto-derived from the
# town label at that segment's start/end - no manual per-day entry. Cheap
# pure-text feature (ASS only, no PNG frames) - safe to toggle without a
# --skip-map re-render.
enabled = false
font = Arial
font_size = 56
outline = 3
# vertical margin from the TOP edge, px - deep enough to clear the map
# insets (which occupy roughly the top 270px at default [map_trip]/
# [map_day] height+margin settings)
margin_v = 280
# fade in/out duration, ms
fade_ms = 300
# total on-screen time per card, seconds (fade in + hold + fade out)
display_secs = 2.0
# a local-day segment shorter than this is skipped entirely - showing a
# card would otherwise risk bleeding into the next segment's card. Doesn't
# affect trips that only cross local midnight while parked overnight (the
# common case); flagged for anyone reusing this on an overnight-driving trip.
min_duration_secs = 2.0
