# Dashcam GPS Overlay - EXAMPLE config
# Copy this file to config.ini and edit config.ini instead - config.ini is
# gitignored, so your personal paths/settings never get committed. You
# should never need to touch the .py scripts.

[paths]
# Folder containing the original dashcam .MP4 segments
clip_folder = real_cam
# Intermediate files (track/labels/map frames) go here
work_folder = work
# Final rendered video
output_file = trip_overlay.mp4

[diagnostics]
# extract_gps.py warns (doesn't stop) when consecutive GPS points are more
# than this many real-world minutes apart (camera power loss/malfunction,
# not just normal clip segmentation). The warning includes a straight-line
# distance estimate - actual mileage for that stretch is undercounted if
# the road wasn't straight during the gap.
gap_warning_minutes = 10

[video]
# x264 quality (lower = better/larger). 18-23 is sensible.
crf = 20
preset = medium
# optional WIDTHxHEIGHT (e.g. 960x540) to downscale the final output for
# faster preview/test renders. Leave blank for full-resolution output.
preview_scale =

[labels]
enabled = true
# {name} = town, {state} = 2-letter state abbreviation
format = {name}, {state}
font = Arial
font_size = 48
# one of: bottom_center, bottom_left, bottom_right, top_center, top_left, top_right
position = bottom_center
# vertical margin from edge, px
margin_v = 60
# fade in/out duration, ms
fade_ms = 500
outline = 2

[info]
# second line under the town name: speed / distance / local time
enabled = true
font_size = 26
# vertical margin from bottom edge, px (sits below the town label)
margin_v = 8
# placeholders: {speed} mph, {dist}/{remain} mi (zero-padded to 4 digits -
# this is a ~2000mi trip), {time} local (24h, zero-padded), {date} local
# (YYYY-MM-DD)
format = {speed:.0f} mph   ·   {dist:04.0f} mi   ·   {remain:04.0f} mi to go   ·   {time}   ·   {date}
# hours to add if the camera clock turns out not to be true UTC
utc_offset_adjust = 0
# Round 4: shown in place of the whole info line (and the town label just
# goes blank) during any clip with zero GPS chunks - see work/gaps.csv.
# Footage from these clips is kept; there's just nothing honest to display
# for speed/position/town during them.
no_gps_text = NO GPS LOCK

[map_trip]
# Full extracted route, fixed bbox for the whole render. Top-left.
enabled = true
# inset width in px; height follows route shape (clamped)
# 480 recommended for wide east-west routes (e.g. VA -> AZ)
width = 480
# one of: top_right, top_left, bottom_right, bottom_left
corner = top_left
# margin from video edges, px
margin = 20
route_color = #9e9e9e
progress_color = #ff3b30
dot_color = #ffffff
panel_color = #000000
panel_alpha = 0.40
line_width = 2.0

# State/coast borders drawn under the route (map_data/us_borders.geojson)
show_borders = true
borders_file = map_data/us_borders.geojson
border_color = #8a8a8a
border_width = 0.7

# Major-city dots near the route (map_data/us_cities.csv)
show_cities = true
cities_file = map_data/us_cities.csv
# include cities within this many miles of the route
city_radius_mi = 40
# minimum spacing between shown cities (higher-ranked city wins)
city_min_gap_mi = 150
city_font_size = 9
city_dot_size = 3.5
city_color = #ffd35c

[map_day]
# Re-frames its bbox at each local-midnight boundary (hard cut). Top-right.
# Same keys as [map_trip], independently enable-able and tunable.
enabled = true
width = 480
corner = top_right
margin = 20
route_color = #9e9e9e
progress_color = #ff3b30
dot_color = #ffffff
panel_color = #000000
panel_alpha = 0.40
line_width = 2.0

show_borders = true
borders_file = map_data/us_borders.geojson
border_color = #8a8a8a
border_width = 0.7

show_cities = true
cities_file = map_data/us_cities.csv
# tighter than map_trip: a single day's driving covers much less ground
city_radius_mi = 30
city_min_gap_mi = 50
city_font_size = 9
city_dot_size = 3.5
city_color = #ffd35c

[roads]
# Round 2: highway shields in the info line. Disabled by default - needs a
# real roads_file (Census TIGER Primary Roads, RTTYP I + U) downloaded on
# this Windows box; the sandbox test fixture
# (map_data/synthetic_roads_test.geojson, hand-simplified I-30 only) is
# NOT suitable for a real trip render.
# When enabled, this REPLACES the ASS "Info" style above with a PNG-strip
# overlay (shield + text); [info] format/font_size/margin_v still apply.
enabled = false
roads_file = map_data/roads.geojson
tolerance_mi = 0.031
grace_secs = 3
shield_height_px = 52
shield_fade_secs = 1
# ~750-820px measured for the [info] format string below (incl. {date}) at
# font_size=26; 880 leaves margin. Re-measure if the format string changes.
text_zone_width_px = 880
shield_gap_px = 12
# "I-30 WB" style route+direction label, right-aligned, immediately left
# of the shield
route_label_width_px = 140
route_label_gap_px = 6
route_label_font_size = 20
margin_v = 8

[local_roads]
# Round 3: local (non-highway) street names, e.g. "Maple Street WB" - shown
# text-only (no shield graphic, real street signs don't have one) in the
# same label zone as the [roads] route label, and ONLY when the vehicle
# isn't currently matched to a highway from [roads]. Fades using the same
# [roads] shield_fade_secs curve (one merged match stream, one fade timer -
# not a separate control here).
# Needs a real roads_file (TIGER All Roads, MTFCC-filtered, Windows-box-only
# download) for a full-trip render; the sandbox test fixture
# (map_data/synthetic_local_roads_test.geojson) is synthetic, same caveat
# as [roads]'s synthetic_roads_test.geojson.
enabled = false
roads_file = map_data/local_roads.geojson
# Tighter than [roads] tolerance_mi (0.031) - local street grids are dense,
# a loose tolerance risks snapping to the wrong parallel street.
tolerance_mi = 0.02
grace_secs = 2
