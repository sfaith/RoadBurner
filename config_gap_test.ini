# Dashcam GPS Overlay - Round 4 sandbox config (GPS-dark clip handling test)
# Real clips 045-056 (hardlinked, no data copy) - this range includes the
# exact 045 -> [046-049 GPS-dark] -> 050 sequence that used to make the
# footage silently jump (clips 046-049 dropped entirely). Also exercises
# 053 (dark) and 056 (dark) later in the same range.
# Safe to delete once Round 4 is verified.

[paths]
clip_folder = _gap_test_clips
work_folder = work_gap_test
output_file = trip_samples/trip_sample_gap_test.mp4

[diagnostics]
gap_warning_minutes = 10

[video]
crf = 20
preset = medium
preview_scale = 960x540

[labels]
enabled = true
format = {name}, {state}
font = Arial
font_size = 48
position = bottom_center
margin_v = 60
fade_ms = 500
outline = 2

[info]
enabled = true
font_size = 26
margin_v = 8
format = {speed:.0f} mph   ·   {dist:04.0f} mi   ·   {remain:04.0f} mi to go   ·   {time}   ·   {date}
utc_offset_adjust = 0
no_gps_text = NO GPS LOCK

[map_trip]
enabled = true
width = 480
corner = top_left
margin = 20
route_color = #9e9e9e
progress_color = #ff3b30
dot_color = #ffffff
panel_color = #000000
panel_alpha = 0.40
line_width = 2.0
show_borders = true
borders_file = map_data/us_borders.geojson
border_color = #8a8a8a
border_width = 0.7
show_cities = true
cities_file = map_data/us_cities.csv
city_radius_mi = 40
city_min_gap_mi = 150
city_font_size = 9
city_dot_size = 3.5
city_color = #ffd35c

[map_day]
enabled = true
width = 480
corner = top_right
margin = 20
route_color = #9e9e9e
progress_color = #ff3b30
dot_color = #ffffff
panel_color = #000000
panel_alpha = 0.40
line_width = 2.0
show_borders = true
borders_file = map_data/us_borders.geojson
border_color = #8a8a8a
border_width = 0.7
show_cities = true
cities_file = map_data/us_cities.csv
city_radius_mi = 30
city_min_gap_mi = 50
city_font_size = 9
city_dot_size = 3.5
city_color = #ffd35c

[roads]
enabled = false
roads_file = map_data/synthetic_roads_test.geojson
tolerance_mi = 0.031
grace_secs = 3
shield_height_px = 52
shield_fade_secs = 1
text_zone_width_px = 880
shield_gap_px = 12
route_label_width_px = 140
route_label_gap_px = 6
route_label_font_size = 20
margin_v = 8

[local_roads]
enabled = false
roads_file = map_data/synthetic_local_roads_test.geojson
tolerance_mi = 0.02
grace_secs = 2
