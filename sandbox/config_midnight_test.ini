# Dashcam GPS Overlay - sandbox test config
# Mirrors production config.ini except: clips 077-079 only (real local
# midnight crossing, TN/AR corridor 2022-05-22 -> 2022-05-23), full-res,
# [compass]/[day_title]/[roads] show_concurrent_designations all flipped
# on so this session's new features finally get a real-footage look.

[paths]
clip_folder = sandbox/_midnight_test_clips
work_folder = sandbox/work_midnight_test
output_file = sandbox/trip_samples/trip_sample_midnight_test.mp4

[diagnostics]
gap_warning_minutes = 10

[video]
crf = 20
preset = medium
preview_scale =

[labels]
enabled = true
format = {name}, {state}
font = Arial
font_size = 48
position = bottom_center
margin_v = 60
fade_ms = 500
outline = 2

[info]
enabled = true
font_size = 26
margin_v = 8
format = {speed:03.0f} mph · {dist:04.0f} mi traveled · {remain:04.0f} mi to go · {time} · {date}
speed_source = average
utc_offset_adjust = 0
no_gps_text = NO GPS LOCK

[map_trip]
enabled = true
width = 480
height = 250
corner = top_left
margin = 20
caption = TRIP MAP
caption_font_size = 10
caption_color = #ffffff
route_color = #9e9e9e
progress_color = #ff3b30
dot_color = #ffffff
panel_color = #000000
panel_alpha = 0.40
line_width = 2.0
show_borders = true
borders_file = map_data/us_borders.geojson
border_color = #8a8a8a
border_width = 0.7
show_cities = true
cities_file = map_data/us_cities.csv
city_radius_mi = 40
city_min_gap_mi = 150
city_font_size = 9
city_dot_size = 3.5
city_color = #ffd35c

[map_day]
enabled = true
width = 480
height = 250
corner = top_right
margin = 20
fade_secs = 2
caption = SEGMENT MAP
caption_font_size = 10
caption_color = #ffffff
route_color = #9e9e9e
progress_color = #ff3b30
dot_color = #ffffff
panel_color = #000000
panel_alpha = 0.40
line_width = 2.0
show_borders = true
borders_file = map_data/us_borders.geojson
border_color = #8a8a8a
border_width = 0.7
show_cities = true
cities_file = map_data/us_cities.csv
city_radius_mi = 30
city_min_gap_mi = 50
city_font_size = 9
city_dot_size = 3.5
city_color = #ffd35c

[roads]
enabled = true
roads_file = map_data/roads.geojson
tolerance_mi = 0.031
grace_secs = 3
freeze_below_mph = 3.0
shield_height_px = 52
shield_fade_secs = 1
text_zone_width_px = 1020
shield_gap_px = 12
route_label_width_px = 220
route_label_gap_px = 6
route_label_font_size = 20
margin_v = 8
# Flipped on for this test render specifically so the new concurrent-
# designation code path actually runs end to end - this TN/AR corridor
# isn't expected to hit a real concurrent stretch (Deming, NM is the only
# confirmed example on this trip), so no visible change is expected here,
# just confirms nothing crashes/regresses on a real render.
show_concurrent_designations = true
max_concurrent_designations = 1
shield_glow_enabled = true
shield_glow_radius_px = 10
shield_glow_alpha = 170
shield_glow_color = #000000

[local_roads]
enabled = true
roads_file = map_data/local_roads.geojson
tolerance_mi = 0.02
grace_secs = 2

[compass]
# Flipped on for this test render (off in production config.ini).
enabled = true
size_px = 44
gap_px = 12
label_gap_px = 6
label_width_px = 100
font_size = 20
smoothing_window_secs = 5
freeze_below_mph = 3.0
hysteresis_hold_secs = 2
needle_color = #d32121
tail_color = #e0e0e0
glow_enabled = true
glow_radius_px = 6
glow_alpha = 170
glow_color = #000000

[day_title]
# The actual point of this render - flipped on to finally see it against
# real footage crossing a real local midnight.
enabled = true
font = Arial
font_size = 56
outline = 3
margin_v = 280
fade_ms = 300
display_secs = 2.0
min_duration_secs = 2.0
