# Dashcam GPS Overlay - full real-trip low-res test render
# Copy of config.ini pointed at all 35 real_cam clips, scaled down for a
# fast end-to-end sanity check (Round 4 verified only on the 12-clip
# gap-test subset so far - this exercises the full clip set for the first
# time, including the real day1->day2 midnight-cut and any remaining
# GPS-dark clips at full scale).
# Safe to delete once verified.

[paths]
clip_folder = real_cam
work_folder = work_real_test
output_file = trip_samples/trip_sample_real_test.mp4

[diagnostics]
gap_warning_minutes = 10

[video]
crf = 20
preset = medium
preview_scale = 960x540

[labels]
enabled = true
format = {name}, {state}
font = Arial
font_size = 48
position = bottom_center
margin_v = 60
fade_ms = 500
outline = 2

[info]
enabled = true
font_size = 26
margin_v = 8
format = {speed:.0f} mph   ·   {dist:04.0f} mi   ·   {remain:04.0f} mi to go   ·   {time}   ·   {date}
utc_offset_adjust = 0
no_gps_text = NO GPS LOCK

[map_trip]
enabled = true
width = 480
corner = top_left
margin = 20
route_color = #9e9e9e
progress_color = #ff3b30
dot_color = #ffffff
panel_color = #000000
panel_alpha = 0.40
line_width = 2.0
show_borders = true
borders_file = map_data/us_borders.geojson
border_color = #8a8a8a
border_width = 0.7
show_cities = true
cities_file = map_data/us_cities.csv
city_radius_mi = 40
city_min_gap_mi = 150
city_font_size = 9
city_dot_size = 3.5
city_color = #ffd35c

[map_day]
enabled = true
width = 480
corner = top_right
margin = 20
route_color = #9e9e9e
progress_color = #ff3b30
dot_color = #ffffff
panel_color = #000000
panel_alpha = 0.40
line_width = 2.0
show_borders = true
borders_file = map_data/us_borders.geojson
border_color = #8a8a8a
border_width = 0.7
show_cities = true
cities_file = map_data/us_cities.csv
city_radius_mi = 30
city_min_gap_mi = 50
city_font_size = 9
city_dot_size = 3.5
city_color = #ffd35c

[roads]
enabled = false
roads_file = map_data/roads.geojson
tolerance_mi = 0.031
grace_secs = 3
shield_height_px = 52
shield_fade_secs = 1
text_zone_width_px = 880
shield_gap_px = 12
route_label_width_px = 140
route_label_gap_px = 6
route_label_font_size = 20
margin_v = 8

[local_roads]
enabled = false
roads_file = map_data/local_roads.geojson
tolerance_mi = 0.02
grace_secs = 2
