# Dashcam GPS Overlay - Round 1 sandbox config (two-map layout test)
# Copy of config.ini pointed at the _r1_clips subset (080-082).
# Safe to delete once Round 1 is verified.

[paths]
clip_folder = _r1_clips
work_folder = work
output_file = trip_samples/trip_sample_v8.mp4

[diagnostics]
gap_warning_minutes = 10

[video]
crf = 20
preset = medium
# sandbox/test renders only - production config.ini leaves this blank (full-res)
preview_scale = 960x540

[labels]
enabled = true
format = {name}, {state}
font = Arial
font_size = 48
position = bottom_center
margin_v = 60
fade_ms = 500
outline = 2

[info]
enabled = true
font_size = 26
margin_v = 8
format = {speed:.0f} mph   ·   {dist:04.0f} mi   ·   {remain:04.0f} mi to go   ·   {time}   ·   {date}
utc_offset_adjust = 0
no_gps_text = NO GPS LOCK

[map_trip]
enabled = true
width = 480
corner = top_left
margin = 20
route_color = #9e9e9e
progress_color = #ff3b30
dot_color = #ffffff
panel_color = #000000
panel_alpha = 0.40
line_width = 2.0
show_borders = true
borders_file = map_data/us_borders.geojson
border_color = #8a8a8a
border_width = 0.7
show_cities = true
cities_file = map_data/us_cities.csv
city_radius_mi = 40
city_min_gap_mi = 150
city_font_size = 9
city_dot_size = 3.5
city_color = #ffd35c

[map_day]
enabled = true
width = 480
corner = top_right
margin = 20
route_color = #9e9e9e
progress_color = #ff3b30
dot_color = #ffffff
panel_color = #000000
panel_alpha = 0.40
line_width = 2.0
show_borders = true
borders_file = map_data/us_borders.geojson
border_color = #8a8a8a
border_width = 0.7
show_cities = true
cities_file = map_data/us_cities.csv
city_radius_mi = 30
city_min_gap_mi = 50
city_font_size = 9
city_dot_size = 3.5
city_color = #ffd35c

[roads]
# Round 2 test fixture only - hand-simplified I-30, NOT Census TIGER data.
# Real TIGER Primary Roads integration is Windows-box-only (see CLAUDE.md).
enabled = true
roads_file = map_data/synthetic_roads_test.geojson
# ~50 m
tolerance_mi = 0.031
# consecutive out-of-tolerance seconds tolerated before dropping a match
grace_secs = 3
shield_height_px = 52
# seconds over which the shield fades in/out on a match change
shield_fade_secs = 1
# fixed-width zone the info text is centered in; shield sits just left of it.
# Measured actual text width at font_size=26 with the [info] format string
# below (incl. the {date} field): ~750-820px depending on digit counts, so
# 880 leaves margin without solving the "width breathing" the design note
# already flags as deferred.
text_zone_width_px = 880
shield_gap_px = 12
# "I-30 WB" style route+direction label, right-aligned, immediately left
# of the shield
route_label_width_px = 140
route_label_gap_px = 6
route_label_font_size = 20
# vertical margin from the bottom edge, px (info-strip overlay position)
margin_v = 8

[local_roads]
# Round 3 test fixture - synthetic, NOT TIGER data. Enabled here (unlike
# production config.ini) so the highway->local fallback path actually gets
# exercised in the sandbox render.
enabled = true
roads_file = map_data/synthetic_local_roads_test.geojson
tolerance_mi = 0.02
grace_secs = 2
